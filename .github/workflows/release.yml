name: Release

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: QA
        run: pnpm qa

      - name: Build
        run: pnpm build

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish all packages with npm trusted publishing
        run: |
          TAG_NAME="${GITHUB_REF##*/}"
          if [[ "$TAG_NAME" == *beta* ]]; then
            NPM_TAG="beta"
          else
            NPM_TAG="latest"
          fi

          for dir in packages/dialect*; do
            npm publish "$dir" --access public --tag "$NPM_TAG"
          done

      - name: GitHub release notes
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
