name: Release

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint check
        run: pnpm lint:check

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Vitest tests
        run: pnpm test

      - name: Bun tests
        run: pnpm test:bun

      - name: Package smoke tests
        run: pnpm smoke:packages

      - name: Verify checks did not mutate files
        run: git diff --exit-code

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish all packages with npm trusted publishing
        run: |
          TAG_NAME="${GITHUB_REF##*/}"
          if [[ "$TAG_NAME" == *beta* ]]; then
            NPM_TAG="beta"
          else
            NPM_TAG="latest"
          fi

          pnpm publish -r --access public --tag "$NPM_TAG" --provenance --no-git-checks

      - name: GitHub release notes
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
