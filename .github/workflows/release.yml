name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: QA
        run: bun run qa

      - name: Build
        run: bun run build

      - name: Publish all packages with npm trusted publishing
        run: |
          npm i -g npm@latest
          for dir in packages/dialect*; do
            cd "$dir"
            npm publish --access public
            cd -
          done

      - name: GitHub release notes
        run: bunx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
