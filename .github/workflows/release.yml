name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - kysely-generic-sqlite
          - kysely-bun-worker
          - kysely-sqlite-worker
          - kysely-dialect-tauri
          - kysely-wasm
          - kysely-wasqlite-worker

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: QA
        run: bun run qa

      - name: Build
        run: bun run build

      - name: GitHub release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish selected package with npm trusted publishing
        if: github.event_name == 'workflow_dispatch'
        run: PACKAGE="${{ inputs.package }}" bun run publish:package

      - name: Publish all packages with npm trusted publishing
        if: startsWith(github.ref, 'refs/tags/')
        run: bun run publish
